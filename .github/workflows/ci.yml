name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: npm test

  capture-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run capture tests (stdlib unittest, no deps)
        run: python3 -m unittest discover -s speckit-extension/tests -p "test_*.py"

      - name: Check capture shape parity
        run: python3 speckit-extension/scripts/check-shape-parity.py

      - name: Check node-assembly parity (commands re-assemble byte-identical)
        run: python3 speckit-extension/scripts/assemble-nodes.py --check

      - name: Check release packaging (every script a shipped command calls is packaged)
        run: python3 speckit-extension/scripts/package-manifest.py --check

      - name: Check command inventory (emissions, install records, and docs match the manifest)
        run: python3 speckit-extension/scripts/check-command-emissions.py

      - name: Command-quality eval (verbosity/timing on fixture specs, prompting on command sources)
        run: |
          python3 .claude/skills/eval-speckit-extension/check_quality.py --strict --feature-dir specs/509-timing-capture
          python3 .claude/skills/eval-speckit-extension/check_quality.py --strict --feature-dir specs/510-living-sync
          python3 .claude/skills/eval-speckit-extension/check_quality.py --strict --feature-dir specs/514-fast-path-fixture
          python3 .claude/skills/eval-speckit-extension/check_quality.py --strict --commands-dir speckit-extension/commands
